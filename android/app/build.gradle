plugins {
    id 'com.android.application'
}

android {
    namespace 'com.itorg.management'
    compileSdk 34

    defaultConfig {
        applicationId "com.itorg.management"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        
        vectorDrawables {
            useSupportLibrary true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    
    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
        }
    }
    
    lint {
        abortOnError false
    }
}