<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - IT Org</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0B1F3A 0%, #1a2d4a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #FF6B00;
        }
        p {
            color: #aaa;
            margin-bottom: 2rem;
        }
        .btn {
            background: #FF6B00;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #e55f00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-wifi"></i> You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry - some features are still available offline.</p>
        <a href="/dashboard/" class="btn">Go to Dashboard</a>
    </div>
</body>
</html>
